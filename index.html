<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modo claro / oscuro</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f5;
        --text: #111827;
        --btn-bg: #111827;
        --btn-text: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        transition: background 0.25s ease, color 0.25s ease;
      }

      body.dark {
        color-scheme: dark;
        --bg: #111827;
        --text: #f9fafb;
        --btn-bg: #f9fafb;
        --btn-text: #111827;
      }

      #theme-toggle {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.2rem;
        font-size: 1rem;
        cursor: pointer;
        background: var(--btn-bg);
        color: var(--btn-text);
        transition: transform 0.15s ease;
      }

      #theme-toggle:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <button id="theme-toggle" aria-label="Cambiar tema">🌙 Modo oscuro</button>

    <script>
      const button = document.getElementById('theme-toggle');

      button.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        button.textContent = isDark ? '☀️ Modo claro' : '🌙 Modo oscuro';
      });
    </script>
  </body>
</html>
